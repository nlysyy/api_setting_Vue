<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
    <style>
      /* ===== 全局 Toast（写在 index.html 里，优先级最高） ===== */
      .global-toast-body {
        position: fixed !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
        padding: 16px 32px !important;
        border-radius: 12px !important;
        font-size: 16px !important;
        font-weight: 600 !important;
        z-index: 9999999 !important; /* 最高级 */
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3) !important;
        max-width: 90% !important;
        text-align: center !important;
        pointer-events: none !important;
        animation: toastPopIn 0.3s ease !important;
        color: #fff !important;
      }

      .global-toast-body.success {
        background: #22c55e !important;
      }

      .global-toast-body.error {
        background: #ef4444 !important;
      }

      .global-toast-body.info {
        background: #2563eb !important;
      }

      @keyframes toastPopIn {
        from {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.8);
        }
        to {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
      }
    </style>
  </head>
  <body style="margin:0; padding:0; overflow-y:scroll;">
    <div id="app" style="width:100%; min-height:100vh; margin:0; padding:0;"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
